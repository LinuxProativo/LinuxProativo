name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=LinuxProativo&show_icons=true&hide=prs,issues,contribs&theme=tokyonight&rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=LinuxProativo&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=ALPack&theme=tokyonight&description_lines_count=2
          path: profile/ALPack.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=ArchBox&theme=tokyonight&description_lines_count=2
          path: profile/ArchBox.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=ckdeps&theme=tokyonight&description_lines_count=2
          path: profile/ckdeps.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=Rex&theme=tokyonight&description_lines_count=2
          path: profile/Rex.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=flexiargs&theme=tokyonight&description_lines_count=2
          path: profile/flexiargs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=obliterate&theme=tokyonight&description_lines_count=2
          path: profile/obliterate.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=overlayfs_fuse&theme=tokyonight&description_lines_count=2
          path: profile/overlayfs_fuse.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=recursive_copy&theme=tokyonight&description_lines_count=2
          path: profile/recursive_copy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=rldd_minimal&theme=tokyonight&description_lines_count=2
          path: profile/rldd_minimal.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=LinuxProativo&repo=tar_minimal&theme=tokyonight&description_lines_count=2
          path: profile/tar_minimal.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
